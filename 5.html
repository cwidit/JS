<!DOCTYPE html>

  <title>DOM</title>

<body>
  <!-- DOM : Document Object Modeling
   diasumsikan seperti pohon keluarga
   DOM adalah jembatan yg menghubungkan antara HTML ke dlm javascript kita

   klo css -> body {xxx}
   klo DOM -> body.xxxx
              <p>Tes</p>
   -->

   <h1 id="heading1" class="heading1">Selamat Datang</h1>

   <!-- karna pakainya JS maka kita bikin script -->
   
   <script>
let heading = document.querySelector("h1");
let heading1Class = document.querySelector(".heading1");
let heading1Id = document.querySelector("#heading1");
let heading1IdNew = document.getElementById(`heading1`);


console.log(heading.innerText);

heading1Class.innerText = "Belajar javascript, saya sudah Jago"; //ini utk merubah text di dalam headingnya pakai innertext
heading1Class.innerHTML = "Belajar javascript, saya sudah <b>Jago</b>";

   </script>
</body>
</html>
